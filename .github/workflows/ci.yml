name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
        xcodebuild -version

    - name: Build
      run: |
        xcodebuild -scheme FeishuSpeech \
          -configuration Debug \
          -destination 'platform=macOS' \
          build
      
    - name: Run Tests
      run: |
        xcodebuild -scheme FeishuSpeech \
          -configuration Debug \
          -destination 'platform=macOS' \
          test
      continue-on-error: true

  lint:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4
    
    - name: Install SwiftLint
      run: brew install swiftlint
      
    - name: Run SwiftLint
      run: swiftlint --strict
      continue-on-error: true
